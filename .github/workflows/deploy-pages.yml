# Publica o site em GitHub Pages (URL: https://<user>.github.io/<repo>/)
# Repositório → Settings → Pages → Build and deployment → Source: GitHub Actions

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Montar pasta do site
        run: |
          mkdir -p _site
          cp -r index.html styles.css app.js sw.js manifest.json content icons _site/

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
